<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AKHARA">
<title>AKHARA — Flash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gold: #c9a84c;
    --gold-dim: #7a6230;
    --gold-glow: rgba(201,168,76,0.12);
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(201,168,76,0.2);
    --correct: #4caf7d;
    --incorrect: #e05555;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--black); color:var(--white); font-family:'DM Mono',monospace; min-height:100vh; overflow-x:hidden; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--black); z-index:100; }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:6px; color:var(--gold); }
  .logo span { color:var(--white); opacity:0.3; font-size:11px; letter-spacing:3px; display:block; font-family:'DM Mono',monospace; margin-top:-4px; }

  .view { display:none; padding:24px; padding-bottom:100px; }
  .view.active { display:block; }
  .section-title { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:4px; color:var(--gold-dim); margin-bottom:16px; }

  .deck-list { display:flex; flex-direction:column; gap:10px; }
  .deck-row { display:flex; align-items:stretch; }
  .deck-card { flex:1; background:var(--surface); border:1px solid var(--border); border-right:none; border-radius:4px 0 0 4px; padding:16px 20px; cursor:pointer; transition:border-color 0.2s; }
  .deck-card:active { border-color:var(--gold); background:var(--surface2); }
  .deck-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
  .deck-meta { font-size:11px; color:var(--gold-dim); margin-top:3px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .diff-pills { display:flex; gap:4px; }
  .diff-pill { font-size:9px; letter-spacing:1px; padding:2px 6px; border-radius:2px; }
  .pill-easy { background:rgba(76,175,125,0.15); color:#4caf7d; }
  .pill-medium { background:rgba(201,168,76,0.15); color:var(--gold); }
  .pill-hard { background:rgba(224,85,85,0.15); color:#e05555; }
  .deck-delete { background:var(--surface); border:1px solid var(--border); border-left:none; border-radius:0 4px 4px 0; color:var(--incorrect); opacity:0.35; font-size:14px; cursor:pointer; padding:0 14px; transition:opacity 0.2s; }
  .deck-delete:active { opacity:1; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--gold-dim); font-size:11px; letter-spacing:2px; line-height:2.2; }

  .btn { font-family:'Bebas Neue',sans-serif; letter-spacing:3px; font-size:16px; border:none; cursor:pointer; border-radius:3px; transition:all 0.2s; display:inline-flex; align-items:center; justify-content:center; }
  .btn-gold { background:var(--gold); color:var(--black); padding:14px 24px; width:100%; }
  .btn-gold:active { opacity:0.85; transform:scale(0.98); }
  .btn-outline { background:transparent; color:var(--gold); border:1px solid var(--border); padding:12px 20px; width:100%; }
  .btn-outline:active { border-color:var(--gold); background:var(--gold-glow); }
  .fab { position:fixed; bottom:32px; right:24px; width:56px; height:56px; background:var(--gold); color:var(--black); border:none; border-radius:50%; font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(201,168,76,0.35); z-index:50; transition:transform 0.2s; }
  .fab:active { transform:scale(0.92); }
  .back-btn { background:none; border:none; color:var(--gold); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; cursor:pointer; padding:0; display:flex; align-items:center; gap:6px; margin-bottom:24px; }

  .form-group { margin-bottom:20px; }
  .form-label { font-size:11px; letter-spacing:3px; color:var(--gold-dim); display:block; margin-bottom:8px; }
  .form-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--white); padding:14px 16px; font-family:'DM Mono',monospace; font-size:14px; border-radius:3px; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--gold); }

  .upload-zone { border:1px dashed var(--border); border-radius:4px; padding:28px 20px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--surface); position:relative; }
  .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-zone.has-files { border-color:var(--gold); background:var(--gold-glow); }
  .upload-icon { font-size:28px; margin-bottom:8px; }
  .upload-text { font-size:11px; letter-spacing:2px; color:var(--gold-dim); }
  .upload-count { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); margin-top:6px; display:none; }
  .page-limit { font-size:10px; color:var(--gold-dim); text-align:center; margin-top:8px; letter-spacing:1px; opacity:0.6; }

  .loading { text-align:center; padding:40px 20px; }
  .loading-bar { width:100%; height:2px; background:var(--surface2); border-radius:2px; overflow:hidden; margin:16px 0; }
  .loading-bar-fill { height:100%; background:var(--gold); animation:load 1.8s ease-in-out infinite; }
  @keyframes load { 0%{width:0%;margin-left:0} 50%{width:65%;margin-left:20%} 100%{width:0%;margin-left:100%} }
  .loading-text { font-size:11px; letter-spacing:3px; color:var(--gold-dim); }

  .diff-filter { display:flex; gap:8px; margin-bottom:20px; }
  .diff-btn { flex:1; padding:10px 4px; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:13px; background:var(--surface); border:1px solid var(--border); color:var(--gold-dim); border-radius:3px; cursor:pointer; transition:all 0.2s; }
  .diff-btn .cnt { font-size:10px; display:block; margin-top:1px; font-family:'DM Mono',monospace; opacity:0.6; }
  .diff-btn.f-all { border-color:var(--gold); color:var(--gold); background:var(--gold-glow); }
  .diff-btn.f-easy { border-color:#4caf7d; color:#4caf7d; background:rgba(76,175,125,0.08); }
  .diff-btn.f-medium { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,0.08); }
  .diff-btn.f-hard { border-color:#e05555; color:#e05555; background:rgba(224,85,85,0.08); }

  .mode-toggle { display:flex; gap:8px; margin-bottom:20px; }
  .mode-btn { flex:1; padding:10px; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:14px; background:var(--surface); border:1px solid var(--border); color:var(--gold-dim); border-radius:3px; cursor:pointer; transition:all 0.2s; }
  .mode-btn.active { background:var(--gold-glow); border-color:var(--gold); color:var(--gold); }

  .deck-title-large { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:4px; margin-bottom:20px; }
  .deck-stats { display:flex; gap:14px; margin-top:-14px; margin-bottom:20px; flex-wrap:wrap; }
  .stat { font-size:11px; letter-spacing:1px; }
  .stat-c { color:#4caf7d; }
  .stat-i { color:#e05555; }
  .stat-t { color:var(--gold-dim); }

  .card-counter { font-size:11px; letter-spacing:2px; color:var(--gold-dim); text-align:center; margin-bottom:14px; }
  .flashcard-wrap { perspective:1000px; height:260px; margin-bottom:18px; cursor:pointer; }
  .flashcard { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .flashcard.flipped { transform:rotateY(180deg); }
  .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:4px; padding:24px 22px; display:flex; flex-direction:column; justify-content:center; }
  .card-front { background:var(--surface); border:1px solid var(--border); }
  .card-back { background:var(--surface2); border:1px solid var(--gold); transform:rotateY(180deg); }
  .card-label { font-size:10px; letter-spacing:3px; color:var(--gold-dim); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
  .card-text { font-size:14px; line-height:1.75; color:var(--white); }
  .card-hint { position:absolute; bottom:14px; right:18px; font-size:9px; letter-spacing:2px; color:var(--gold-dim); opacity:0.5; }
  .badge { font-size:9px; letter-spacing:2px; padding:2px 8px; border-radius:2px; }
  .b-easy { background:rgba(76,175,125,0.15); color:#4caf7d; }
  .b-medium { background:rgba(201,168,76,0.15); color:var(--gold); }
  .b-hard { background:rgba(224,85,85,0.15); color:#e05555; }

  .type-area { margin-bottom:14px; }
  .type-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--white); padding:13px 15px; font-family:'DM Mono',monospace; font-size:13px; border-radius:3px; outline:none; resize:none; min-height:76px; transition:border-color 0.2s; line-height:1.6; }
  .type-input:focus { border-color:var(--gold); }
  .type-input.cb { border-color:#4caf7d; }
  .type-input.ib { border-color:#e05555; }
  .result-banner { border-radius:3px; padding:11px 15px; font-size:11px; letter-spacing:1px; line-height:1.7; margin-bottom:14px; display:none; }
  .rb-c { background:rgba(76,175,125,0.08); border:1px solid #4caf7d; color:#4caf7d; }
  .rb-i { background:rgba(224,85,85,0.08); border:1px solid #e05555; color:#e05555; }

  .action-row { display:flex; gap:10px; margin-bottom:10px; }
  .btn-c { flex:1; background:rgba(76,175,125,0.08); border:1px solid #4caf7d; color:#4caf7d; padding:13px; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:15px; border-radius:3px; cursor:pointer; }
  .btn-c:active { background:rgba(76,175,125,0.2); }
  .btn-i { flex:1; background:rgba(224,85,85,0.08); border:1px solid #e05555; color:#e05555; padding:13px; font-family:'Bebas Neue',sans-serif; letter-spacing:2px; font-size:15px; border-radius:3px; cursor:pointer; }
  .btn-i:active { background:rgba(224,85,85,0.2); }

  .complete-screen { text-align:center; padding:40px 10px; }
  .complete-title { font-family:'Bebas Neue',sans-serif; font-size:52px; letter-spacing:6px; color:var(--gold); }
  .complete-sub { font-size:11px; letter-spacing:3px; color:var(--gold-dim); margin:4px 0 32px; }
  .score-row { display:flex; justify-content:center; gap:36px; margin-bottom:36px; }
  .score-block { text-align:center; }
  .score-num { font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:1; }
  .score-label { font-size:10px; letter-spacing:3px; color:var(--gold-dim); margin-top:4px; }

  .error-msg { background:rgba(224,85,85,0.08); border:1px solid #e05555; color:#e05555; padding:12px 15px; border-radius:3px; font-size:11px; letter-spacing:1px; margin-top:12px; display:none; line-height:1.7; }
  .no-cards-msg { text-align:center; padding:40px 20px; color:var(--gold-dim); font-size:11px; letter-spacing:2px; line-height:2; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AKHARA<span>FLASH</span></div>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="12" stroke="#c9a84c" stroke-width="1.5"/>
    <line x1="14" y1="2" x2="14" y2="26" stroke="#c9a84c" stroke-width="1.5"/>
    <line x1="2" y1="14" x2="26" y2="14" stroke="#c9a84c" stroke-width="0.75" opacity="0.5"/>
    <circle cx="14" cy="14" r="2.5" fill="#c9a84c"/>
  </svg>
</div>

<!-- HOME -->
<div id="view-home" class="view active">
  <p class="section-title">YOUR DECKS</p>
  <div class="deck-list" id="deck-list"></div>
  <button class="fab" onclick="showView('view-create')">+</button>
</div>

<!-- CREATE -->
<div id="view-create" class="view">
  <button class="back-btn" onclick="showView('view-home')">← BACK</button>
  <p class="section-title">NEW DECK</p>
  <div class="form-group">
    <label class="form-label">DECK NAME</label>
    <input type="text" class="form-input" id="deck-name-input" placeholder="e.g. Exercise 11b, Cardiology, Contract Law" maxlength="50">
  </div>
  <div class="form-group">
    <label class="form-label">UPLOAD PAGES (MAX 5)</label>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="upload-icon">📄</div>
      <div class="upload-text">TAP TO SELECT PHOTOS</div>
      <div class="upload-count" id="upload-count"></div>
    </div>
    <p class="page-limit">1–5 PAGES · ANY SUBJECT</p>
  </div>
  <div class="error-msg" id="create-error"></div>
  <button class="btn btn-gold" id="generate-btn" onclick="generateCards()">SCAN & GENERATE CARDS</button>
  <div class="loading" id="loading-state" style="display:none">
    <div class="loading-text">READING PAGES</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div class="loading-text">GENERATING FLASHCARDS...</div>
  </div>
</div>

<!-- STUDY -->
<div id="view-deck" class="view">
  <button class="back-btn" onclick="showView('view-home')">← DECKS</button>
  <div class="deck-title-large" id="study-deck-name"></div>
  <div class="deck-stats">
    <span class="stat stat-c" id="stat-c">✓ 0</span>
    <span class="stat stat-i" id="stat-i">✗ 0</span>
    <span class="stat stat-t" id="stat-t">— CARDS</span>
  </div>

  <div class="diff-filter">
    <button class="diff-btn f-all" id="fb-all" onclick="setFilter('all')">ALL<span class="cnt" id="cnt-all">—</span></button>
    <button class="diff-btn" id="fb-easy" onclick="setFilter('easy')">EASY<span class="cnt" id="cnt-easy">—</span></button>
    <button class="diff-btn" id="fb-medium" onclick="setFilter('medium')">MED<span class="cnt" id="cnt-medium">—</span></button>
    <button class="diff-btn" id="fb-hard" onclick="setFilter('hard')">HARD<span class="cnt" id="cnt-hard">—</span></button>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="mb-flip" onclick="setMode('flip')">FLIP</button>
    <button class="mode-btn" id="mb-type" onclick="setMode('type')">TYPE</button>
  </div>

  <div class="no-cards-msg" id="no-cards-msg" style="display:none">NO CARDS IN THIS DIFFICULTY</div>

  <div id="card-area">
    <div class="card-counter" id="card-counter"></div>
    <div class="flashcard-wrap" id="fw" onclick="flipCard()">
      <div class="flashcard" id="fc">
        <div class="card-face card-front">
          <div class="card-label">
            <span>QUESTION</span>
            <span class="badge" id="diff-badge"></span>
          </div>
          <div class="card-text" id="cq"></div>
          <div class="card-hint">TAP TO FLIP</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label"><span>ANSWER</span></div>
          <div class="card-text" id="ca"></div>
        </div>
      </div>
    </div>

    <div class="type-area" id="type-area" style="display:none">
      <textarea class="type-input" id="type-input" placeholder="TYPE YOUR ANSWER..."></textarea>
      <div class="result-banner" id="result-banner"></div>
      <button class="btn btn-gold" id="check-btn" onclick="checkAnswer()" style="margin-bottom:10px">CHECK ANSWER</button>
    </div>

    <div class="action-row" id="flip-actions" style="display:none">
      <button class="btn-i" onclick="markCard(false)">✗ WRONG</button>
      <button class="btn-c" onclick="markCard(true)">✓ GOT IT</button>
    </div>

    <button class="btn btn-outline" id="next-btn" onclick="nextCard()" style="display:none">NEXT →</button>
  </div>

  <div class="complete-screen" id="complete-screen" style="display:none">
    <div class="complete-title">DONE</div>
    <div class="complete-sub">SESSION COMPLETE</div>
    <div class="score-row">
      <div class="score-block">
        <div class="score-num stat-c" id="fin-c">0</div>
        <div class="score-label">CORRECT</div>
      </div>
      <div class="score-block">
        <div class="score-num stat-i" id="fin-i">0</div>
        <div class="score-label">WRONG</div>
      </div>
    </div>
    <button class="btn btn-gold" onclick="restartDeck()" style="margin-bottom:12px">RESTART DECK</button>
    <button class="btn btn-outline" onclick="showView('view-home')">BACK TO DECKS</button>
  </div>
</div>

<script>
let decks = JSON.parse(localStorage.getItem('akhara_flash_v2') || '[]');
let selFiles = [];
let deckIdx = -1;
let filtered = [];
let cardIdx = 0;
let mode = 'flip';
let filter = 'all';
let flipped = false;
let answered = false;
let sc = 0, si = 0;

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'view-home') renderDecks();
  if (id === 'view-create') resetForm();
}

function handleFiles(files) {
  selFiles = Array.from(files).slice(0, 5);
  const zone = document.getElementById('upload-zone');
  const cnt = document.getElementById('upload-count');
  if (selFiles.length) {
    zone.classList.add('has-files');
    cnt.style.display = 'block';
    cnt.textContent = selFiles.length + ' PAGE' + (selFiles.length > 1 ? 'S' : '');
  } else {
    zone.classList.remove('has-files');
    cnt.style.display = 'none';
  }
}

async function generateCards() {
  const name = document.getElementById('deck-name-input').value.trim();
  const err = document.getElementById('create-error');
  err.style.display = 'none';
  if (!name) { showErr('ENTER A DECK NAME.'); return; }
  if (!selFiles.length) { showErr('SELECT AT LEAST 1 IMAGE.'); return; }

  document.getElementById('generate-btn').style.display = 'none';
  document.getElementById('loading-state').style.display = 'block';

  try {
    const imgs = await Promise.all(selFiles.map(f => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res({ type:'image', source:{ type:'base64', media_type:f.type, data:r.result.split(',')[1] } });
      r.onerror = rej;
      r.readAsDataURL(f);
    })));

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a universal flashcard generator. You receive study material images from ANY subject — aviation, medicine, law, engineering, history, finance, or anything else.

Extract the most important, examinable knowledge. Return ONLY a raw JSON array, no markdown, no backticks, no explanation.

Format exactly: [{"q":"question","a":"answer","d":"easy"},...]

Difficulty:
- easy: definitions, basic facts, simple recall
- medium: cause/effect, procedures, applied concepts
- hard: complex reasoning, nuanced distinctions, multi-step

Rules: 4-8 cards per page, highest-yield knowledge only, precise answer wording from source material. Return ONLY the JSON array.`,
        messages: [{ role:'user', content:[...imgs, {type:'text', text:'Generate flashcards from these pages.'}] }]
      })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'API error');

    const raw = data.content.find(b => b.type === 'text')?.text || '';
    const cards = JSON.parse(raw.replace(/```json|```/g,'').trim());
    if (!Array.isArray(cards) || !cards.length) throw new Error('No cards generated — try clearer images.');

    const deck = { id: Date.now(), name: name.toUpperCase(), cards, created: new Date().toLocaleDateString() };
    decks.push(deck);
    localStorage.setItem('akhara_flash_v2', JSON.stringify(decks));
    showView('view-home');
    openDeck(decks.length - 1);
  } catch(e) {
    document.getElementById('generate-btn').style.display = 'block';
    document.getElementById('loading-state').style.display = 'none';
    showErr('ERROR: ' + (e.message || 'Try again.'));
  }
}

function showErr(msg) {
  const el = document.getElementById('create-error');
  el.textContent = msg; el.style.display = 'block';
}

function renderDecks() {
  const list = document.getElementById('deck-list');
  if (!decks.length) { list.innerHTML = '<div class="empty-state">NO DECKS YET<br>TAP + TO CREATE ONE</div>'; return; }
  list.innerHTML = decks.map((d, i) => {
    const e = d.cards.filter(c=>c.d==='easy').length;
    const m = d.cards.filter(c=>c.d==='medium').length;
    const h = d.cards.filter(c=>c.d==='hard').length;
    return `<div class="deck-row">
      <div class="deck-card" onclick="openDeck(${i})">
        <div class="deck-name">${d.name}</div>
        <div class="deck-meta">
          <span>${d.cards.length} CARDS · ${d.created}</span>
          <div class="diff-pills">
            ${e?`<span class="diff-pill pill-easy">${e}E</span>`:''}
            ${m?`<span class="diff-pill pill-medium">${m}M</span>`:''}
            ${h?`<span class="diff-pill pill-hard">${h}H</span>`:''}
          </div>
        </div>
      </div>
      <button class="deck-delete" onclick="delDeck(event,${i})">✕</button>
    </div>`;
  }).join('');
}

function delDeck(e, i) {
  e.stopPropagation();
  if (confirm('Delete "' + decks[i].name + '"?')) {
    decks.splice(i,1);
    localStorage.setItem('akhara_flash_v2', JSON.stringify(decks));
    renderDecks();
  }
}

function openDeck(i) {
  deckIdx = i; filter = 'all'; mode = 'flip'; sc = 0; si = 0;
  document.getElementById('mb-flip').classList.add('active');
  document.getElementById('mb-type').classList.remove('active');
  document.getElementById('study-deck-name').textContent = decks[i].name;
  updateCounts();
  applyFilter();
  showView('view-deck');
}

function updateCounts() {
  const cards = decks[deckIdx].cards;
  document.getElementById('cnt-all').textContent = cards.length;
  document.getElementById('cnt-easy').textContent = cards.filter(c=>c.d==='easy').length;
  document.getElementById('cnt-medium').textContent = cards.filter(c=>c.d==='medium').length;
  document.getElementById('cnt-hard').textContent = cards.filter(c=>c.d==='hard').length;
}

function setFilter(f) {
  filter = f;
  ['all','easy','medium','hard'].forEach(x => {
    document.getElementById('fb-'+x).className = 'diff-btn' + (x===f?' f-'+x:'');
  });
  applyFilter();
}

function applyFilter() {
  const cards = decks[deckIdx].cards;
  filtered = filter === 'all' ? [...cards] : cards.filter(c=>c.d===filter);
  cardIdx = 0; sc = 0; si = 0;
  updateStats();
  if (!filtered.length) {
    document.getElementById('no-cards-msg').style.display = 'block';
    document.getElementById('card-area').style.display = 'none';
    document.getElementById('complete-screen').style.display = 'none';
  } else {
    document.getElementById('no-cards-msg').style.display = 'none';
    document.getElementById('card-area').style.display = 'block';
    document.getElementById('complete-screen').style.display = 'none';
    renderCard();
  }
}

function renderCard() {
  const card = filtered[cardIdx];
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('card-area').style.display = 'block';
  document.getElementById('card-counter').textContent = (cardIdx+1) + ' / ' + filtered.length;
  document.getElementById('cq').textContent = card.q;
  document.getElementById('ca').textContent = card.a;

  const badge = document.getElementById('diff-badge');
  const labels = {easy:'EASY',medium:'MED',hard:'HARD'};
  const classes = {easy:'badge b-easy',medium:'badge b-medium',hard:'badge b-hard'};
  badge.textContent = labels[card.d]||'';
  badge.className = classes[card.d]||'badge';

  flipped = false; answered = false;
  document.getElementById('fc').classList.remove('flipped');

  const ti = document.getElementById('type-input');
  ti.value = ''; ti.className = 'type-input';
  const rb = document.getElementById('result-banner');
  rb.style.display = 'none'; rb.className = 'result-banner';

  if (mode === 'flip') {
    document.getElementById('fw').style.pointerEvents = 'auto';
    document.getElementById('type-area').style.display = 'none';
    document.getElementById('flip-actions').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
  } else {
    document.getElementById('fw').style.pointerEvents = 'none';
    document.getElementById('type-area').style.display = 'block';
    document.getElementById('flip-actions').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('check-btn').style.display = 'block';
  }
}

function flipCard() {
  if (mode !== 'flip') return;
  flipped = !flipped;
  document.getElementById('fc').classList.toggle('flipped', flipped);
  if (flipped && !answered) document.getElementById('flip-actions').style.display = 'flex';
}

function markCard(correct) {
  if (answered) return;
  answered = true;
  correct ? sc++ : si++;
  updateStats();
  document.getElementById('flip-actions').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';
}

function checkAnswer() {
  const user = document.getElementById('type-input').value.trim();
  if (!user) return;
  const card = filtered[cardIdx];
  const ok = isCorrect(user, card.a);
  const rb = document.getElementById('result-banner');
  const ti = document.getElementById('type-input');
  document.getElementById('check-btn').style.display = 'none';
  rb.style.display = 'block';
  if (ok) {
    rb.className = 'result-banner rb-c'; rb.textContent = '✓ CORRECT';
    ti.className = 'type-input cb'; sc++;
  } else {
    rb.className = 'result-banner rb-i';
    rb.innerHTML = '✗ INCORRECT<br><span style="opacity:0.65;font-size:11px">ANSWER: ' + card.a + '</span>';
    ti.className = 'type-input ib'; si++;
  }
  answered = true;
  updateStats();
  document.getElementById('next-btn').style.display = 'block';
}

function isCorrect(user, answer) {
  const u = user.toLowerCase().trim();
  const a = answer.toLowerCase().trim();
  if (u === a) return true;
  if (a.includes(u) && u.length > 8) return true;
  const uw = u.split(/\s+/), aw = a.split(/\s+/);
  const hits = uw.filter(w => w.length > 3 && aw.includes(w)).length;
  return hits / Math.max(aw.length, 1) > 0.5;
}

function nextCard() {
  if (cardIdx < filtered.length - 1) { cardIdx++; renderCard(); }
  else showComplete();
}

function showComplete() {
  document.getElementById('card-area').style.display = 'none';
  document.getElementById('fin-c').textContent = sc;
  document.getElementById('fin-i').textContent = si;
  document.getElementById('complete-screen').style.display = 'block';
}

function restartDeck() {
  cardIdx = 0; sc = 0; si = 0;
  updateStats();
  document.getElementById('complete-screen').style.display = 'none';
  document.getElementById('card-area').style.display = 'block';
  renderCard();
}

function updateStats() {
  document.getElementById('stat-c').textContent = '✓ ' + sc;
  document.getElementById('stat-i').textContent = '✗ ' + si;
  document.getElementById('stat-t').textContent = filtered.length + ' CARDS';
}

function setMode(m) {
  mode = m;
  document.getElementById('mb-flip').classList.toggle('active', m==='flip');
  document.getElementById('mb-type').classList.toggle('active', m==='type');
  if (filtered.length) renderCard();
}

function resetForm() {
  document.getElementById('deck-name-input').value = '';
  document.getElementById('file-input').value = '';
  document.getElementById('upload-zone').classList.remove('has-files');
  document.getElementById('upload-count').style.display = 'none';
  document.getElementById('create-error').style.display = 'none';
  document.getElementById('generate-btn').style.display = 'block';
  document.getElementById('loading-state').style.display = 'none';
  selFiles = [];
}

renderDecks();
</script>
</body>
</html>
